# Dispatcherd Configuration for Docker Environment
# This configuration enables task scheduling and execution across processes

version: 2

brokers:
  pg_notify:
    config:
      # Database connection - configured for Docker environment
      dbname: metrics_service
      user: metrics_service
      password: metrics_service
      host: postgres
      port: 5432

    channels:
      - 'metrics_tasks' # Main task execution channel
      - 'metrics_cleanup' # Cleanup and maintenance tasks
      - 'metrics_notifications' # Email and notification tasks
      - 'metrics_collectors' # Metrics collection tasks
      - 'metrics_utility' # Metrics-utility specific tasks

service:
  pool_kwargs:
    max_workers: 4

  # Health check configuration
  health_check:
    enabled: true
    interval: 60  # seconds

# Logging configuration
logging:
  level: INFO
  format: '%(asctime)s [%(levelname)s] %(name)s: %(message)s'

# Queue routing - map task types to specific channels
queue_routing:
  'hello_world': 'metrics_tasks'
  'cleanup_old_data': 'metrics_cleanup'
  'cleanup_old_tasks': 'metrics_cleanup'
  'send_notification_email': 'metrics_notifications'
  'process_user_data': 'metrics_tasks'
  'execute_db_task': 'metrics_tasks'
  'sleep': 'metrics_tasks'
  'collect_anonymous_metrics': 'metrics_collectors'
  'collect_config_metrics': 'metrics_collectors'
  'collect_job_host_summary': 'metrics_collectors'
  'collect_host_metrics': 'metrics_collectors'
  'collect_all_metrics': 'metrics_collectors'

  # Metrics-utility tasks
  'gather_automation_controller_billing_data': 'metrics_utility'
  'build_metrics_report': 'metrics_utility'
  'metrics_utility_health_check': 'metrics_utility'
  'metrics_utility_custom_command': 'metrics_utility'

