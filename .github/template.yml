name: AAP Service Template
description: A modern Django service template following Ansible Automation Platform (AAP) standards and best practices

variables:
  service_name:
    description: 'The name of your service (lowercase, hyphen-separated)'
    default: 'my-service'
  service_name_underscore:
    description: 'The name of your service (lowercase, underscore-separated)'
    default: 'my_service'
  service_title:
    description: 'The display title of your service'
    default: 'My Service'
  service_description:
    description: 'Brief description of your service'
    default: 'A Django service built with AAP standards'

files:
  - .github/template.yml

instructions: |
  ## Using This Template

  1. **Click "Use this template"** to create a new repository
  2. **Replace template variables** throughout the codebase:
     - Search and replace `my-service` with your service name (hyphen-separated)
     - Search and replace `my_service` with your service name (underscore-separated)
     - Search and replace `My Service` with your service display title
  3. **Update configuration**:
     - Edit `pyproject.toml` with your project details
     - Update `config/settings.yaml.example` with your settings
  4. **Start development**:
     ```bash
     pip install -e ".[dev]"
     python manage.py migrate
     python manage.py runserver
     ```

  ## Quick Start with Docker

  ```bash
  docker-compose up
  ```

  Your service will be available at http://localhost:8000

  ## Template Variables to Replace

  | Template | Replace With | Example |
  |----------|--------------|---------|
  | `my-service` | Your service name (kebab-case) | `inventory-service` |
  | `my_service` | Your service name (snake_case) | `inventory_service` |
  | `My Service` | Your service display name | `Inventory Service` |
  | `AAP Team` | Your team name | `Inventory Team` |
  | `team@example.com` | Your team email | `inventory-team@company.com` |
