name: "Sync Requirements Files"

on:
    push:
        branches: [devel]
        paths:
            - "uv.lock"
            - "pyproject.toml"
    pull_request:
        paths:
            - "uv.lock"
            - "pyproject.toml"

permissions:
  contents: write
  pull-requests: write

jobs:
    sync-requirements:
        runs-on: ubuntu-latest

        steps:
            - name: "Checkout metrics-service (${{ github.ref }})"
              uses: actions/checkout@v5
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: "Install uv"
              uses: astral-sh/setup-uv@v7

            - name: "Set up Python"
              uses: actions/setup-python@v6
              with:
                  python-version-file: "pyproject.toml"

            - name: "Sync requirements files"
              run: |
                  chmod +x sync-requirements.sh
                  ./sync-requirements.sh

            - name: "Check for changes"
              id: changes
              run: |
                  if ! git diff --quiet requirements-pinned.txt dev-requirements.txt requirements-build.txt; then
                    echo "changed=true" >> $GITHUB_OUTPUT
                    echo "Requirements files have been updated"
                  else
                    echo "changed=false" >> $GITHUB_OUTPUT
                    echo "Requirements files are up to date"
                  fi

            - name: "Commit and push changes"
              if: steps.changes.outputs.changed == 'true' && github.event_name == 'push'
              run: |
                  git config --local user.email "action@github.com"
                  git config --local user.name "GitHub Action"
                  git add requirements-pinned.txt dev-requirements.txt requirements-build.txt
                  git commit -m "Auto-sync requirements files from uv.lock"
                  git push

            - name: "Add PR comment for changes"
              if: steps.changes.outputs.changed == 'true' && github.event_name == 'pull_request'
              uses: actions/github-script@v8
              with:
                  script: |
                      github.rest.issues.createComment({
                        issue_number: context.issue.number,
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        body: '**Requirements files need to be updated**\n\nThe `uv.lock` or `pyproject.toml` files have changed but the requirements files are not in sync. Please run `./sync-requirements.sh` locally and commit the updated requirements files.'
                      })

            - name: "Fail if requirements out of sync in PR"
              if: steps.changes.outputs.changed == 'true' && github.event_name == 'pull_request'
              run: |
                  echo "Requirements files are out of sync. Please run ./sync-requirements.sh locally and commit the changes."
                  git diff requirements-pinned.txt dev-requirements.txt requirements-build.txt
                  exit 1