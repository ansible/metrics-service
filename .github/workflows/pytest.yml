name: "Pytest tests"

on:
  push:
    branches: ["devel"]
  pull_request:
    branches: ["devel"]

# Explicitly set read-only permissions for security
permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_metrics_service
          POSTGRES_USER: metrics_service
          POSTGRES_PASSWORD: metrics_service
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v5

      - name: "Install uv"
        uses: astral-sh/setup-uv@v7

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: "Run pytest"
        env:
          METRICS_SERVICE_DB_HOST: localhost
          METRICS_SERVICE_DB_PORT: 5432
          METRICS_SERVICE_DB_USER: metrics_service
          METRICS_SERVICE_DB_PASSWORD: metrics_service
          METRICS_SERVICE_TEST_DB_NAME: test_metrics_service
          METRICS_SERVICE_DB_SSLMODE: disable
          DJANGO_SETTINGS_MODULE: metrics_service.settings.test
        run: |
          uv run pytest -s -v --cov=. --cov-report=xml
