---
# Docker Compose configuration for testing
services:
  postgres-test:
    image: 'postgres:15'
    container_name: metrics-service-postgres-test
    environment:
      POSTGRES_DB: test_metrics_service
      POSTGRES_USER: metrics_service
      POSTGRES_PASSWORD: metrics_service
    healthcheck:
      test:
        [
          'CMD',
          'pg_isready',
          '-U',
          'metrics_service',
          '-d',
          'test_metrics_service',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '55433:5432'
    networks:
      - metrics-service-test
    tmpfs:
      - /var/lib/postgresql/data:noexec,nosuid,size=512m

  redis-test:
    image: 'redis:7'
    container_name: metrics-service-redis-test
    ports:
      - '6380:6379'
    networks:
      - metrics-service-test
    tmpfs:
      - /data:noexec,nosuid,size=256m

networks:
  metrics-service-test:
    name: metrics-service-test
