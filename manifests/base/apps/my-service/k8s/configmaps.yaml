apiVersion: v1
kind: ConfigMap
metadata:
  name: my-service-config
data:
  MY_SERVICE_ENV: 'development'
  MY_SERVICE_DB_HOST: 'postgresql'
  MY_SERVICE_DB_PORT: '55432'
  MY_SERVICE_DB_NAME: 'my_service'
  MY_SERVICE_REDIS_URL: 'redis://redis:6379/0'
  MY_SERVICE_ALLOWED_HOSTS: 'localhost,127.0.0.1,my-service'
  MY_SERVICE_CORS_ALLOWED_ORIGINS: 'http://localhost:3000,http://127.0.0.1:3000'
