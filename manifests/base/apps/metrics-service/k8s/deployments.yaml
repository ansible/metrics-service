apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-service
  labels:
    app: metrics-service
    component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metrics-service
      component: api
  template:
    metadata:
      labels:
        app: metrics-service
        component: api
    spec:
      serviceAccountName: metrics-service
      automountServiceAccountToken: false
      containers:
        - name: metrics-service
          image: metrics-service:1.0.0
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: METRICS_SERVICE_ENV
              value: 'development'
            - name: METRICS_SERVICE_DB_HOST
              value: 'postgresql'
            - name: METRICS_SERVICE_DB_PORT
              value: '55432'
            - name: METRICS_SERVICE_DB_NAME
              value: 'metrics_service'
            - name: METRICS_SERVICE_DB_USER
              valueFrom:
                secretKeyRef:
                  name: metrics-service-db
                  key: username
            - name: METRICS_SERVICE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metrics-service-db
                  key: password
            - name: METRICS_SERVICE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: metrics-service-secrets
                  key: secret-key
            - name: metrics_service_REDIS_URL
              value: 'redis://redis:6379/0'
          livenessProbe:
            httpGet:
              path: /health/liveness/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/readiness/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: '256Mi'
              cpu: '100m'
              ephemeral-storage: '256Mi'
            limits:
              memory: '512Mi'
              cpu: '500m'
              ephemeral-storage: '512Mi'
          volumeMounts:
            - name: static-files
              mountPath: /app/staticfiles
            - name: media-files
              mountPath: /app/media
      volumes:
        - name: static-files
          emptyDir: {}
        - name: media-files
          emptyDir: {}
