apiVersion: v1
kind: ConfigMap
metadata:
  name: metrics-service-config
data:
  metrics_service_ENV: 'development'
  metrics_service_DB_HOST: 'postgresql'
  metrics_service_DB_PORT: '55432'
  metrics_service_DB_NAME: 'metrics_service'
  metrics_service_REDIS_URL: 'redis://redis:6379/0'
  metrics_service_ALLOWED_HOSTS: 'localhost,127.0.0.1,metrics-service'
  metrics_service_CORS_ALLOWED_ORIGINS: 'http://localhost:3000,http://127.0.0.1:3000'
