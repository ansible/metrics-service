# Complete documentation with many more options at:
# https://docs.sonarqube.org/latest/analysis/analysis-parameters/

## The unique project identifier. This is mandatory.
# Do not duplicate or reuse!
# Available characters: [a-zA-Z0-9_:\.\-]
# Must have least one non-digit.
# Recommended format: <group>:<project>
sonar.projectKey=ansible_metrics-service

sonar.organization=ansible

# Customize what paths to scan. Default is .
sonar.sources=.
sonar.exclusions=**/tests/**,**/migrations/**,**/tools/**,.venv/**,scripts/**,htmlcov/**,**/settings/**

# Verbose name of project displayed in WUI. Default is set to the projectKey. This field is optional.
sonar.projectName=metrics-service

# Version of project. This field is optional.
#sonar.projectVersion=1.0

# Tell sonar scanner where coverage files exist
sonar.python.coverage.reportPaths=coverage.xml
# Exclude certain directories from code coverage reporting
sonar.coverage.exclusions=**/tests/**,**/tools**,**/migrations/**,**/settings/**,metrics_service/asgi.py,metrics_service/wsgi.py,metrics_service/test_urls.py,metrics_service/settings.py
# Manages code duplication sensitivity.  Default is 100.  Higher number means less sensitive.
sonar.cpd.python.minimumTokens=150
sonar.cpd.python.minimumLines=300
sonar.issue.ignore.multicriteria=e1,e2,e3
# Ignore "should be a variable"
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S1192
sonar.issue.ignore.multicriteria.e1.resourceKey=**/migrations/**/*

# Only scan with python3
sonar.python.version=3.12

# Ignore code dupe for the migrations, tests and xlsx report definitions
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S1192
sonar.issue.ignore.multicriteria.e2.resourceKey=**/tests/**
sonar.issue.ignore.multicriteria.e3.ruleKey=python:S1192
sonar.issue.ignore.multicriteria.e3.resourceKey=**/report/**

sonar.cpd.exclusions=**/migrations/*.py,**/tests/**/*.py,**/report/*.py,**/tools/**/*.*,**/.github/**,*.md,*.yaml,*.yml,*.conf,*.html,*.sh
sonar.test.exclusions=tests/**
sonar.security.hotspots.ignored=**/tests/**
