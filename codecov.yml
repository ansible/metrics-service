codecov:
  require_ci_to_pass: yes

coverage:
  precision: 2
  round: down
  range: "50...100"

  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 1%

# Ignore files/directories that tests won't cover
ignore:
  - "*/migrations/*"        # Django migrations
  - "*/tests/*"             # Test files themselves
  - "tests/*"               # Root test directory
  - "manage.py"             # Django management script
  - "*/wsgi.py"             # WSGI entry points
  - "*/asgi.py"             # ASGI entry points
  - "metrics_service/settings/*"  # Django settings files
  - "apps/settings/*"       # Dynaconf settings files
  - "**/__pycache__/*"      # Python cache
  - "*.pyc"                 # Compiled Python files

flags:
  unit-tests:
    carryforward: true
    paths:
      - apps/
      - metrics_service/

comment:
  layout: "reach,diff,flags,files"
  behavior: default
