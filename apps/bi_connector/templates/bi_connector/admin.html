<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BI Connector Admin — Metrics Service</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
    .animate-pulse-dot { animation: pulse-dot 1.5s ease-in-out infinite; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<div id="root"></div>

<script type="text/babel">
/* ─── helpers ──────────────────────────────────────────────────────── */

function getCsrfToken() {
  const match = document.cookie.match(/(?:^|;\s*)csrftoken=([^;]+)/);
  return match ? match[1] : "";
}

function buildHeaders(username, password) {
  const creds = btoa(`${username}:${password}`);
  return {
    "Content-Type": "application/json",
    "Authorization": `Basic ${creds}`,
    "X-CSRFToken": getCsrfToken(),
  };
}

function fmt(ts) {
  if (!ts) return "—";
  return new Date(ts).toLocaleString();
}

/* ─── stat card ────────────────────────────────────────────────────── */

function StatCard({ label, value, icon, color }) {
  const colors = {
    blue:   { bg: "bg-blue-50",   text: "text-blue-600",   icon: "bg-blue-100"   },
    green:  { bg: "bg-green-50",  text: "text-green-600",  icon: "bg-green-100"  },
    amber:  { bg: "bg-amber-50",  text: "text-amber-600",  icon: "bg-amber-100"  },
    purple: { bg: "bg-purple-50", text: "text-purple-600", icon: "bg-purple-100" },
  };
  const c = colors[color] || colors.blue;
  return (
    <div className={`rounded-xl shadow-sm border border-gray-100 p-5 flex items-center gap-4 bg-white`}>
      <div className={`p-3 rounded-lg ${c.icon}`}>
        <span className={`text-xl ${c.text}`}>{icon}</span>
      </div>
      <div>
        <p className="text-xs text-gray-500 uppercase tracking-wide font-medium">{label}</p>
        <p className={`text-2xl font-bold ${c.text}`}>{value ?? "—"}</p>
      </div>
    </div>
  );
}

/* ─── status badge ─────────────────────────────────────────────────── */

function StatusBadge({ status }) {
  const map = {
    pending:   "bg-gray-100 text-gray-600",
    running:   "bg-blue-100 text-blue-700 animate-pulse-dot",
    completed: "bg-green-100 text-green-700",
    failed:    "bg-red-100 text-red-700",
  };
  const cls = map[status] || "bg-gray-100 text-gray-600";
  return (
    <span className={`rounded-full px-2 py-0.5 text-xs font-medium inline-flex items-center gap-1 ${cls}`}>
      {status === "running" && <span className="inline-block w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse-dot" />}
      {status}
    </span>
  );
}

/* ─── toggle switch ────────────────────────────────────────────────── */

function Toggle({ checked, onChange, disabled }) {
  return (
    <button
      type="button"
      role="switch"
      aria-checked={checked}
      disabled={disabled}
      onClick={() => !disabled && onChange(!checked)}
      className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-1
        ${checked ? "bg-blue-600" : "bg-gray-300"} ${disabled ? "opacity-50 cursor-not-allowed" : "cursor-pointer"}`}
    >
      <span
        className={`inline-block h-4 w-4 transform rounded-full bg-white shadow transition-transform
          ${checked ? "translate-x-6" : "translate-x-1"}`}
      />
    </button>
  );
}

/* ─── section header ───────────────────────────────────────────────── */

function SectionHeader({ title, action }) {
  return (
    <div className="flex items-center justify-between mb-3">
      <h2 className="text-base font-semibold text-gray-800">{title}</h2>
      {action}
    </div>
  );
}

/* ─── main app ─────────────────────────────────────────────────────── */

function App() {
  /* auth state */
  const [username, setUsername]   = React.useState("demo_admin");
  const [password, setPassword]   = React.useState("demo_password");
  const [authApplied, setAuthApplied] = React.useState({ username: "demo_admin", password: "demo_password" });

  /* data state */
  const [connected, setConnected]             = React.useState(null); /* null=loading, true/false */
  const [lastRefreshed, setLastRefreshed]     = React.useState(null);
  const [hostMetricsCount, setHostMetricsCount]   = React.useState(null);
  const [jobSummariesCount, setJobSummariesCount] = React.useState(null);
  const [activeBatchCount, setActiveBatchCount]   = React.useState(null);
  const [biEnabled, setBiEnabled]                 = React.useState(null);

  const [collectors, setCollectors]       = React.useState([]);        /* available_collectors list */
  const [collectorMap, setCollectorMap]   = React.useState({});        /* current_value map */
  const [togglingKey, setTogglingKey]     = React.useState(null);

  const [batches, setBatches]             = React.useState([]);
  const [batchesLoading, setBatchesLoading] = React.useState(false);

  /* backfill form state */
  const [bfCollector, setBfCollector]   = React.useState("");
  const [bfSince, setBfSince]           = React.useState("");
  const [bfUntil, setBfUntil]           = React.useState("");
  const [bfBatchType, setBfBatchType]   = React.useState("backfill");
  const [bfSubmitting, setBfSubmitting] = React.useState(false);
  const [bfResult, setBfResult]         = React.useState(null); /* { ok: bool, msg: str } */

  /* ── fetch helpers ── */

  const headers = React.useCallback(
    () => buildHeaders(authApplied.username, authApplied.password),
    [authApplied]
  );

  const fetchCollectorSettings = React.useCallback(async () => {
    try {
      const res = await fetch("/api/v1/bi/collector-settings/", { headers: headers() });
      if (!res.ok) {
        setConnected(false);
        setBiEnabled(false);
        return;
      }
      setConnected(true);
      setBiEnabled(true);
      const data = await res.json();
      setCollectors(data.available_collectors || []);
      setCollectorMap(data.current_value || {});
      if (!bfCollector && data.available_collectors && data.available_collectors.length > 0) {
        setBfCollector(data.available_collectors[0]);
      }
    } catch {
      setConnected(false);
      setBiEnabled(false);
    }
  }, [headers, bfCollector]);

  const fetchStoredCounts = React.useCallback(async () => {
    try {
      const [hRes, jRes] = await Promise.all([
        fetch("/api/v1/bi/stored/host-metrics/?limit=1", { headers: headers() }),
        fetch("/api/v1/bi/stored/job-host-summaries/?limit=1", { headers: headers() }),
      ]);
      if (hRes.ok) {
        const d = await hRes.json();
        setHostMetricsCount(d.count ?? null);
      }
      if (jRes.ok) {
        const d = await jRes.json();
        setJobSummariesCount(d.count ?? null);
      }
    } catch {
      /* non-fatal */
    }
  }, [headers]);

  const fetchBatches = React.useCallback(async () => {
    setBatchesLoading(true);
    try {
      const res = await fetch("/api/v1/bi/collector-settings/batches/?limit=20", { headers: headers() });
      if (res.ok) {
        const data = await res.json();
        const results = data.results || data || [];
        setBatches(results.slice(0, 20));
        const running = results.filter((b) => b.status === "running").length;
        setActiveBatchCount(running);
      }
    } catch {
      /* non-fatal */
    } finally {
      setBatchesLoading(false);
    }
  }, [headers]);

  const refreshAll = React.useCallback(async () => {
    await Promise.all([fetchCollectorSettings(), fetchStoredCounts(), fetchBatches()]);
    setLastRefreshed(new Date());
  }, [fetchCollectorSettings, fetchStoredCounts, fetchBatches]);

  /* initial load + auto-refresh every 10s */
  React.useEffect(() => {
    refreshAll();
    const id = setInterval(refreshAll, 10_000);
    return () => clearInterval(id);
  }, [refreshAll]);

  /* ── auth apply ── */

  function applyAuth() {
    setAuthApplied({ username, password });
  }

  /* ── collector toggle ── */

  async function handleCollectorToggle(key, newValue) {
    setTogglingKey(key);
    try {
      const res = await fetch("/api/v1/bi/collector-settings/", {
        method: "PATCH",
        headers: headers(),
        body: JSON.stringify({ [key]: newValue }),
      });
      if (res.ok) {
        const data = await res.json();
        setCollectorMap(data.current_value || {});
      } else {
        alert("Failed to update collector setting.");
      }
    } catch {
      alert("Network error updating collector setting.");
    } finally {
      setTogglingKey(null);
    }
  }

  /* ── backfill submit ── */

  async function handleBackfillSubmit(e) {
    e.preventDefault();
    setBfSubmitting(true);
    setBfResult(null);

    /* Convert local date strings (YYYY-MM-DD) to ISO-8601 UTC midnight strings */
    const sinceIso = bfSince ? `${bfSince}T00:00:00Z` : undefined;
    const untilIso = bfUntil ? `${bfUntil}T23:59:59Z` : undefined;

    const body = { collector_type: bfCollector, batch_type: bfBatchType };
    if (sinceIso) body.since = sinceIso;
    if (untilIso) body.until = untilIso;

    try {
      const res = await fetch("/api/v1/bi/collector-settings/batches/", {
        method: "POST",
        headers: headers(),
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (res.ok || res.status === 202) {
        setBfResult({ ok: true, msg: `Batch created — ID: ${data.id}, Task: ${data.task_id}` });
        fetchBatches();
      } else {
        setBfResult({ ok: false, msg: data.detail || JSON.stringify(data) });
      }
    } catch (err) {
      setBfResult({ ok: false, msg: String(err) });
    } finally {
      setBfSubmitting(false);
    }
  }

  /* ─── render ─────────────────────────────────────────────────────── */

  const connectedPill = connected === null
    ? <span className="rounded-full px-2.5 py-1 text-xs font-medium bg-gray-100 text-gray-500">Connecting…</span>
    : connected
      ? <span className="rounded-full px-2.5 py-1 text-xs font-medium bg-green-100 text-green-700">● Connected</span>
      : <span className="rounded-full px-2.5 py-1 text-xs font-medium bg-red-100 text-red-700">● Error</span>;

  return (
    <div className="max-w-5xl mx-auto px-4 py-8 space-y-8">

      {/* ── Header ── */}
      <div className="flex items-start justify-between flex-wrap gap-3">
        <div className="flex items-center gap-3">
          {/* AAP-style logo badge */}
          <div className="w-10 h-10 rounded-lg bg-red-600 flex items-center justify-center shadow-sm flex-shrink-0">
            <svg className="w-6 h-6 text-white" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="white" strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </div>
          <div>
            <h1 className="text-2xl font-bold text-gray-900 leading-tight">BI Connector Admin</h1>
            <p className="text-sm text-gray-500">Metrics Service · Ansible Automation Platform</p>
          </div>
        </div>
        <div className="flex items-center gap-3">
          {connectedPill}
          {lastRefreshed && (
            <span className="text-xs text-gray-400">Refreshed {lastRefreshed.toLocaleTimeString()}</span>
          )}
        </div>
      </div>

      {/* ── Auth bar ── */}
      <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
        <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Authentication</p>
        <div className="flex flex-wrap items-end gap-3">
          <div>
            <label className="block text-xs text-gray-600 mb-1" htmlFor="auth-username">Username</label>
            <input
              id="auth-username"
              type="text"
              value={username}
              onChange={(e) => setUsername(e.target.value)}
              className="rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>
          <div>
            <label className="block text-xs text-gray-600 mb-1" htmlFor="auth-password">Password</label>
            <input
              id="auth-password"
              type="password"
              value={password}
              onChange={(e) => setPassword(e.target.value)}
              className="rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>
          <button
            onClick={applyAuth}
            className="px-4 py-1.5 rounded-md bg-blue-600 text-white text-sm font-medium hover:bg-blue-700 transition-colors"
          >
            Apply
          </button>
          <span className="text-xs text-gray-400 self-center">
            Authenticated as <strong>{authApplied.username}</strong>
          </span>
        </div>
      </div>

      {/* ── Data Summary ── */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
        <StatCard label="Host Metrics" value={hostMetricsCount} icon="📊" color="blue" />
        <StatCard label="Job Summaries" value={jobSummariesCount} icon="📋" color="green" />
        <StatCard label="Active Batches" value={activeBatchCount} icon="⚡" color="amber" />
        <StatCard
          label="BI Connector"
          value={biEnabled === null ? "…" : biEnabled ? "Enabled" : "Disabled"}
          icon="🔌"
          color="purple"
        />
      </div>

      {/* ── Collectors table ── */}
      <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
        <SectionHeader title="Collectors" />
        {collectors.length === 0 ? (
          <p className="text-sm text-gray-400">Loading collectors…</p>
        ) : (
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="border-b border-gray-100">
                  <th className="text-left py-2 pr-4 font-medium text-gray-500 text-xs uppercase tracking-wide">Collector</th>
                  <th className="text-left py-2 pr-4 font-medium text-gray-500 text-xs uppercase tracking-wide">Type</th>
                  <th className="text-left py-2 font-medium text-gray-500 text-xs uppercase tracking-wide">Enabled</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-gray-50">
                {collectors.map((key) => {
                  const isBilling = ["main_host", "main_host_daily", "job_host_summary", "main_indirectmanagednodeaudit"].includes(key);
                  /* if not in current_value map, treat as enabled */
                  const isEnabled = key in collectorMap ? collectorMap[key] : true;
                  return (
                    <tr key={key} className="hover:bg-gray-50 transition-colors">
                      <td className="py-2.5 pr-4 font-mono text-gray-800 text-xs">{key}</td>
                      <td className="py-2.5 pr-4">
                        <span className={`rounded-full px-2 py-0.5 text-xs font-medium ${
                          isBilling ? "bg-purple-100 text-purple-700" : "bg-blue-100 text-blue-700"
                        }`}>
                          {isBilling ? "billing" : "metrics"}
                        </span>
                      </td>
                      <td className="py-2.5">
                        <Toggle
                          checked={isEnabled}
                          onChange={(val) => handleCollectorToggle(key, val)}
                          disabled={togglingKey === key}
                        />
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {/* ── Backfill form ── */}
      <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
        <SectionHeader title="Trigger Backfill" />
        <form onSubmit={handleBackfillSubmit} className="space-y-4">
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            {/* Collector type */}
            <div>
              <label className="block text-xs text-gray-600 mb-1" htmlFor="bf-collector">Collector</label>
              <select
                id="bf-collector"
                value={bfCollector}
                onChange={(e) => setBfCollector(e.target.value)}
                required
                className="w-full rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white"
              >
                {collectors.map((c) => (
                  <option key={c} value={c}>{c}</option>
                ))}
              </select>
            </div>

            {/* Since date */}
            <div>
              <label className="block text-xs text-gray-600 mb-1" htmlFor="bf-since">Since</label>
              <input
                id="bf-since"
                type="date"
                value={bfSince}
                onChange={(e) => setBfSince(e.target.value)}
                className="w-full rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
              />
            </div>

            {/* Until date */}
            <div>
              <label className="block text-xs text-gray-600 mb-1" htmlFor="bf-until">Until</label>
              <input
                id="bf-until"
                type="date"
                value={bfUntil}
                onChange={(e) => setBfUntil(e.target.value)}
                className="w-full rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
              />
            </div>

            {/* Batch type */}
            <div>
              <label className="block text-xs text-gray-600 mb-1">Batch Type</label>
              <div className="flex gap-3 items-center h-8">
                {["backfill", "scheduled"].map((bt) => (
                  <label key={bt} className="flex items-center gap-1.5 cursor-pointer text-sm text-gray-700">
                    <input
                      type="radio"
                      name="batch-type"
                      value={bt}
                      checked={bfBatchType === bt}
                      onChange={() => setBfBatchType(bt)}
                      className="accent-blue-600"
                    />
                    {bt}
                  </label>
                ))}
              </div>
            </div>
          </div>

          {/* Submit */}
          <div className="flex items-center gap-4">
            <button
              type="submit"
              disabled={bfSubmitting || !bfCollector}
              className="px-5 py-2 rounded-md bg-blue-600 text-white text-sm font-medium hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
            >
              {bfSubmitting ? "Submitting…" : "Trigger Backfill"}
            </button>

            {bfResult && (
              <span className={`text-sm rounded-md px-3 py-1 ${
                bfResult.ok ? "bg-green-50 text-green-700 border border-green-200" : "bg-red-50 text-red-700 border border-red-200"
              }`}>
                {bfResult.ok ? "✓ " : "✗ "}{bfResult.msg}
              </span>
            )}
          </div>
        </form>
      </div>

      {/* ── Batch history ── */}
      <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
        <SectionHeader
          title="Batch History (last 20)"
          action={
            <button
              onClick={fetchBatches}
              disabled={batchesLoading}
              className="px-3 py-1 rounded-md border border-gray-200 text-xs font-medium text-gray-600 hover:bg-gray-50 disabled:opacity-50 transition-colors"
            >
              {batchesLoading ? "Refreshing…" : "↻ Refresh"}
            </button>
          }
        />
        {batches.length === 0 && !batchesLoading ? (
          <p className="text-sm text-gray-400">No batch records yet.</p>
        ) : (
          <div className="overflow-x-auto">
            <table className="w-full text-xs">
              <thead>
                <tr className="border-b border-gray-100">
                  {["ID", "Collector", "Type", "Status", "Records", "Started", "Completed"].map((h) => (
                    <th key={h} className="text-left py-2 pr-3 font-medium text-gray-500 uppercase tracking-wide whitespace-nowrap">{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody className="divide-y divide-gray-50">
                {batches.map((b) => (
                  <tr key={b.id} className="hover:bg-gray-50 transition-colors">
                    <td className="py-2 pr-3 text-gray-500 font-mono">{b.id}</td>
                    <td className="py-2 pr-3 font-mono text-gray-800 whitespace-nowrap">{b.collector_type}</td>
                    <td className="py-2 pr-3">
                      <span className="rounded-full px-2 py-0.5 bg-gray-100 text-gray-600 text-xs">{b.batch_type}</span>
                    </td>
                    <td className="py-2 pr-3 whitespace-nowrap">
                      <StatusBadge status={b.status} />
                    </td>
                    <td className="py-2 pr-3 text-gray-700">{b.records_imported ?? "—"}</td>
                    <td className="py-2 pr-3 text-gray-500 whitespace-nowrap">{fmt(b.started_at)}</td>
                    <td className="py-2 text-gray-500 whitespace-nowrap">{fmt(b.completed_at)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>

      <p className="text-center text-xs text-gray-400 pb-4">
        Auto-refreshes every 10 seconds · Ansible Automation Platform Metrics Service
      </p>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
