---
services:
  postgres:
    image: "mirror.gcr.io/postgres:15"
    container_name: metrics-service-postgres
    environment:
      POSTGRES_DB: metrics_service
      POSTGRES_USER: metrics_service
      POSTGRES_PASSWORD: metrics_service
    healthcheck:
      test:
        ["CMD", "pg_isready", "-U", "metrics_service", "-d", "metrics_service"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    networks:
      - metrics-service
    volumes:
      - "metrics_service_db:/var/lib/postgresql/data"

  metrics-service-init:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: metrics-service-init
    command: "/app/scripts/init.sh"
    volumes:
      - "./:/app:z"
      - "/app/.venv"
      - {type: tmpfs, target: /app/metrics_service.egg-info, tmpfs: {mode: 0o01777}}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      METRICS_SERVICE_DATABASES__default__HOST: postgres
      METRICS_SERVICE_DATABASES__default__PASSWORD: metrics_service
      METRICS_SERVICE_MODE: development
    networks:
      - metrics-service

  metrics-service-web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: metrics-service-web
    command: "python manage.py runserver 0.0.0.0:8000"
    volumes:
      - "./:/app:z"
      - "/app/.venv"
      - {type: tmpfs, target: /app/metrics_service.egg-info, tmpfs: {mode: 0o01777}}
    ports:
      - ${METRICS_SERVICE_PORT:-8000}:8000
    depends_on:
      postgres:
        condition: service_healthy
      metrics-service-init:
        condition: service_completed_successfully
    environment:
      METRICS_SERVICE_DATABASES__default__HOST: postgres
      METRICS_SERVICE_DATABASES__default__PASSWORD: metrics_service
      METRICS_SERVICE_MODE: development
    networks:
      - metrics-service

  metrics-service-dispatcher:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: metrics-service-dispatcher
    command: "python manage.py run_dispatcherd"
    volumes:
      - "./:/app:z"
      - "/app/.venv"
      - {type: tmpfs, target: /app/metrics_service.egg-info, tmpfs: {mode: 0o01777}}
    depends_on:
      postgres:
        condition: service_healthy
      metrics-service-init:
        condition: service_completed_successfully
    environment:
      METRICS_SERVICE_DATABASES__awx__HOST: postgres
      METRICS_SERVICE_DATABASES__awx__PASSWORD: metrics_service
      METRICS_SERVICE_DATABASES__awx__USER: metrics_service
      METRICS_SERVICE_DATABASES__default__HOST: postgres
      METRICS_SERVICE_DATABASES__default__PASSWORD: metrics_service
      METRICS_SERVICE_MODE: development
    networks:
      - metrics-service

  metrics-service-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: metrics-service-scheduler
    command: "python manage.py run_task_scheduler"
    volumes:
      - "./:/app:z"
      - "/app/.venv"
      - {type: tmpfs, target: /app/metrics_service.egg-info, tmpfs: {mode: 0o01777}}
    depends_on:
      postgres:
        condition: service_healthy
      metrics-service-init:
        condition: service_completed_successfully
    environment:
      METRICS_SERVICE_DATABASES__default__HOST: postgres
      METRICS_SERVICE_DATABASES__default__PASSWORD: metrics_service
      METRICS_SERVICE_MODE: development
    networks:
      - metrics-service

volumes:
  metrics_service_db:
    name: metrics_service_app_db

networks:
  metrics-service:
    name: metrics-service
