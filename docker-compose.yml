---
services:
  postgres:
    image: 'postgres:15'
    container_name: my-service-postgres
    environment:
      POSTGRES_DB: my_service
      POSTGRES_USER: my_service
      POSTGRES_PASSWORD: my_service
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'my_service', '-d', 'my_service']
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - '55432:5432'
    networks:
      - my-service
    volumes:
      - 'my_service_db:/var/lib/postgresql/data'

  redis:
    image: 'redis:7'
    container_name: my-service-redis
    ports:
      - '6379:6379'
    networks:
      - my-service

  my-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my-service-app
    command: 'python manage.py runserver 0.0.0.0:8000'
    volumes:
      - './:/app:z'
    ports:
      - ${MY_SERVICE_PORT:-8000}:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      MY_SERVICE_ENV: development
      MY_SERVICE_SECRET_KEY: dev-secret-key-change-in-production
      MY_SERVICE_DB_ENGINE: django.db.backends.postgresql
      MY_SERVICE_DB_HOST: postgres
      MY_SERVICE_DB_PORT: 5432
      MY_SERVICE_DB_USER: my_service
      MY_SERVICE_DB_PASSWORD: my_service
      MY_SERVICE_DB_NAME: my_service
      MY_SERVICE_REDIS_URL: redis://redis:6379/0
      MY_SERVICE_ALLOWED_HOSTS: localhost,127.0.0.1,my-service
      DJANGO_SETTINGS_MODULE: my_service.settings.development
    networks:
      - my-service

volumes:
  my_service_db:
    name: my_service_app_db

networks:
  my-service:
    name: my-service
