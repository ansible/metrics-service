---
services:
  postgres:
    image: "mirror.gcr.io/postgres:15"
    container_name: metrics-service-postgres
    environment:
      POSTGRES_DB: metrics_service
      POSTGRES_USER: metrics_service
      POSTGRES_PASSWORD: metrics_service
    healthcheck:
      test:
        ["CMD", "pg_isready", "-U", "metrics_service", "-d", "metrics_service"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    networks:
      - metrics-service
    volumes:
      - "metrics_service_db:/var/lib/postgresql/data"

  metrics-service-init:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: metrics-service-init
    entrypoint: ["/app/scripts/init.sh"]
    volumes:
      - "./:/app:z"
      - "/app/.venv"
      - {
          type: tmpfs,
          target: /app/metrics_service.egg-info,
          tmpfs: { mode: 0o01777 },
        }
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      METRICS_SERVICE_DATABASES__default__HOST: postgres
      METRICS_SERVICE_DATABASES__default__PASSWORD: metrics_service
      METRICS_SERVICE_MODE: development
      METRICS_SERVICE_FEATURE__DASHBOARD_COLLECTION: "true"
      METRICS_SERVICE_DASHBOARD_COLLECTION__COLLECTION_SCHEDULE_CRON: "*/5 * * * *" # Every 5 minutes for testing
    networks:
      - metrics-service

  metrics-service-web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: metrics-service-web
    entrypoint: ["/app/scripts/entrypoint-web.sh"]
    volumes:
      - "./:/app:z"
      - "/app/.venv"
      - {
          type: tmpfs,
          target: /app/metrics_service.egg-info,
          tmpfs: { mode: 0o01777 },
        }
    ports:
      - ${METRICS_SERVICE_PORT:-8000}:8000
    depends_on:
      postgres:
        condition: service_healthy
      metrics-service-init:
        condition: service_completed_successfully
    environment:
      METRICS_SERVICE_DATABASES__default__HOST: postgres
      # Development-only password. In production, override with secrets management.
      METRICS_SERVICE_DATABASES__default__PASSWORD: metrics_service
      METRICS_SERVICE_MODE: development
      METRICS_SERVICE_FEATURE__DASHBOARD_COLLECTION: "true"
    networks:
      - metrics-service

  metrics-service-dispatcher:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: metrics-service-dispatcher
    entrypoint: ["/app/scripts/entrypoint-dispatcherd.sh"]
    volumes:
      - "./:/app:z"
      - "/app/.venv"
      - {
          type: tmpfs,
          target: /app/metrics_service.egg-info,
          tmpfs: { mode: 0o01777 },
        }
    depends_on:
      postgres:
        condition: service_healthy
      metrics-service-init:
        condition: service_completed_successfully
    environment:
      METRICS_SERVICE_DATABASES__awx__HOST: postgres
      METRICS_SERVICE_DATABASES__awx__PASSWORD: metrics_service
      METRICS_SERVICE_DATABASES__awx__USER: metrics_service
      METRICS_SERVICE_DATABASES__default__HOST: postgres
      METRICS_SERVICE_DATABASES__default__PASSWORD: metrics_service
      METRICS_SERVICE_MODE: development
      # Required: collect_dashboard_reports_initial_data reads DASHBOARD_COLLECTION_GROUP.tasks
      # at runtime to create the follow-up task — the cron is evaluated from settings at import
      # time, so without this var it falls back to the default "0 */6 * * *" instead of 5-min.
      METRICS_SERVICE_DASHBOARD_COLLECTION__COLLECTION_SCHEDULE_CRON: "*/5 * * * *"
      # Required: get_feature_enabled_from_db falls back to settings.FEATURE when the
      # DB setting is absent; without this the flag defaults to False and tasks are skipped.
      METRICS_SERVICE_FEATURE__DASHBOARD_COLLECTION: "true"
    networks:
      - metrics-service

  metrics-service-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: metrics-service-scheduler
    entrypoint: ["/app/scripts/entrypoint-scheduler.sh"]
    volumes:
      - "./:/app:z"
      - "/app/.venv"
      - {
          type: tmpfs,
          target: /app/metrics_service.egg-info,
          tmpfs: { mode: 0o01777 },
        }
    depends_on:
      postgres:
        condition: service_healthy
      metrics-service-init:
        condition: service_completed_successfully
    environment:
      METRICS_SERVICE_DATABASES__default__HOST: postgres
      METRICS_SERVICE_DATABASES__default__PASSWORD: metrics_service
      METRICS_SERVICE_MODE: development
      # Required: get_feature_enabled_from_db falls back to settings.FEATURE when the
      # DB setting is absent; without this the flag defaults to False and tasks are skipped.
      # (Cron is not needed here — the scheduler reads cron_expression from the DB Task record.)
      METRICS_SERVICE_FEATURE__DASHBOARD_COLLECTION: "true"
    networks:
      - metrics-service

volumes:
  metrics_service_db:
    name: metrics_service_app_db

networks:
  metrics-service:
    name: metrics-service
