[uwsgi]
# Django application configuration (HTTP mode - no nginx)
module = metrics_service.wsgi:application
chdir = /opt/metrics-service

# Process management
master = true
processes = 4
threads = 2
enable-threads = true

# HTTP configuration (direct HTTP serving)
http = 0.0.0.0:8000
http-keepalive = true
http-auto-chunked = true
http-timeout = 120

# User and group
uid = metrics-service
gid = metrics-service

# Environment
env = DJANGO_SETTINGS_MODULE=metrics_service.settings
env = METRICS_SERVICE_MODE=production

# Logging
logto = /var/log/metrics-service/uwsgi.log
log-maxsize = 52428800
log-backupname = /var/log/metrics-service/uwsgi.log.old

# Performance tuning
harakiri = 120
max-requests = 5000
max-requests-delta = 100
reload-on-rss = 512
worker-reload-mercy = 60

# Buffer sizes
buffer-size = 32768
post-buffering = 8192

# Stats server (for monitoring)
stats = /run/metrics-service/stats.sock
stats-http = true

# Graceful reload
die-on-term = true
hook-master-start = unix_signal:15 gracefully_kill_them_all

# PID file
pidfile = /run/metrics-service/uwsgi.pid

# Cheaper subsystem for dynamic process scaling
cheaper-algo = busyness
cheaper = 2
cheaper-initial = 4
cheaper-step = 1
cheaper-busyness-multiplier = 30
cheaper-busyness-min = 20
cheaper-busyness-max = 70
cheaper-busyness-backlog-alert = 16
cheaper-busyness-backlog-step = 2
