[uwsgi]
# Django application configuration for containers
module = metrics_service.wsgi:application
chdir = /opt/app-root/src

# Process management
master = true
processes = 4
threads = 2
enable-threads = true

# HTTP configuration (direct HTTP serving)
http = 0.0.0.0:8000
http-keepalive = true
http-auto-chunked = true
http-timeout = 120

# Performance tuning
harakiri = 120
max-requests = 5000
max-requests-delta = 100
reload-on-rss = 512
worker-reload-mercy = 60

# Buffer sizes
buffer-size = 32768
post-buffering = 8192

# Graceful reload
die-on-term = true

# Cheaper subsystem for dynamic process scaling
cheaper-algo = busyness
cheaper = 2
cheaper-initial = 4
cheaper-step = 1
cheaper-busyness-multiplier = 30
cheaper-busyness-min = 20
cheaper-busyness-max = 70
cheaper-busyness-backlog-alert = 16
cheaper-busyness-backlog-step = 2

# Logging
logto = /opt/app-root/src/logs/uwsgi.log
log-maxsize = 52428800
